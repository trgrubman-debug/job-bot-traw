  name: job-bot                                                                 
                                                                                
  on:                                                                           
    schedule:                                                                   
      - cron: "0 13 * * *"                                                    
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    run:
      runs-on: ubuntu-latest
      steps:                                                                    
        - uses: actions/checkout@v4
                                                                                
        - uses: actions/setup-python@v5                     
          with:                                                               
            python-version: "3.11"

        - name: Install dependencies
          run: pip install -r requirements.txt
                                                                                
        - name: Run the bot
          env:                                                                  
            DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          run: python3 job_bot.py                                             

        - name: Commit updated dedup DB
          run: |
            git config user.name  "job-bot"                                     
            git config user.email "job-bot@users.noreply.github.com"
            git add -f seen_jobs.db                                             
            if git diff --cached --quiet; then              
              echo "No DB changes to commit."                                 
            else                                                                
              git commit -m "Update seen_jobs.db [skip ci]"
              git push                                                          
            fi
